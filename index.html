<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>贵州高速服务设施 POI 地图</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    window._AMapSecurityConfig = {
      securityJsCode: "1acf31e6fec21ecda33981b3f9972b2f"
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=63012397200899138fc66edc8f54a72a&plugin=AMap.Scale,AMap.ToolBar"></script>
</head>
<body>
  <main id="app">
    <aside id="panel" aria-label="数据与筛选面板">
      <section class="brand">
        <div class="kicker">Guizhou Expressway POI</div>
        <h1>贵州高速服务设施布局图</h1>
        <p>服务区、加油站、休息区、收费站 · 点位数据绘图</p>
      </section>

      <section class="card">
        <div class="card-title">数据状态</div>
        <div id="status" class="status">正在加载点位数据…</div>
      </section>

      <section class="card">
        <div class="card-title">图层筛选</div>
        <label class="toggle-row">
          <input id="road-toggle" type="checkbox" />
          显示高速路网
        </label>
        <label class="search-box">
          <span>高速筛选</span>
          <input id="road-search" type="search" placeholder="输入高速编号/名称，如 G60、沪昆" />
        </label>
        <div class="form-grid">
          <label>
            沿线范围(km)
            <input id="corridor-km" type="number" min="0.5" max="20" step="0.5" value="3" />
          </label>
          <label class="toggle-row compact-toggle">
            <input id="road-point-filter" type="checkbox" checked />
            只看沿线点位
          </label>
        </div>
        <div class="button-row">
          <button id="road-all">全选高速</button>
          <button id="road-none">清空高速</button>
        </div>
        <div id="road-filters" class="road-list"></div>
        <div id="road-status" class="status"></div>
        <div id="type-filters" class="chip-grid"></div>
        <label class="search-box">
          <span>名称搜索</span>
          <input id="name-search" type="search" placeholder="输入服务区/收费站名称" />
        </label>
        <div class="toggle-stack">
          <label class="toggle-row">
            <input id="label-service" type="checkbox" checked />
            显示服务区名称
          </label>
          <label class="toggle-row">
            <input id="label-all" type="checkbox" />
            显示全部名称
          </label>
          <label class="toggle-row">
            <input id="trusted-only" type="checkbox" checked />
            隐藏明显异常点
          </label>
        </div>
        <div class="button-row">
          <button id="btn-fit">适配视野</button>
          <button id="btn-export-csv">导出点位 CSV</button>
        </div>
      </section>

      <section class="card">
        <div class="card-title">统计</div>
        <div id="stats" class="stats-grid"></div>
        <div id="drop-summary" class="drop-summary"></div>
      </section>

      <section class="card results-card">
        <div class="card-title">点位清单</div>
        <div id="result-list" class="result-list"></div>
      </section>
    </aside>

    <section id="map-wrap">
      <div id="map"></div>
      <div id="map-note">数据来自高德 POI 关键词检索，适合概念性布局研判；点位需按重点项目人工复核。</div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
